; PlatformIO project — OSOS ESP32-S2 WiFi bridge for the OpenSpand / ZX81.
; Board: LOLIN/WeMos S2 Mini (ESP32-S2). Permanently attached to the OpenSpand
; serial header; serves OSOS as a zxsvr file server + auto-update source over WiFi.

[platformio]
default_envs = lolin_s2_mini

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Native USB CDC for the Serial debug console on the S2 Mini.
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=0

; LittleFS holds the uploaded program .p and the mirrored menu.p.
board_build.filesystem = littlefs

lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.1.0

; Over-the-air uploads:  pio run -e ota -t upload
[env:ota]
extends = env:lolin_s2_mini
upload_protocol = espota
upload_port = osos.local
upload_flags =
    --auth=osos-ota
